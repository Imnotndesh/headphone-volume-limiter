name: Build Release ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin zip

      - name: Extract tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract extension UUID
        id: uuid
        run: |
          UUID=$(python3 -c "import json; print(json.load(open('metadata.json'))['uuid'])")
          echo "UUID=$UUID" >> $GITHUB_OUTPUT

      - name: Build release ZIP
        run: |
          EXT_DIR="${{ steps.uuid.outputs.UUID }}"
          mkdir -p "$EXT_DIR"

          # Required files
          cp extension.js "$EXT_DIR/"
          cp prefs.js "$EXT_DIR/"
          cp metadata.json "$EXT_DIR/"

          # Lib (only the JS files, nothing else)
          if [ -d lib ]; then
            mkdir -p "$EXT_DIR/lib"
            cp lib/*.js "$EXT_DIR/lib/"
          fi

          # Schemas — COPY XML THEN COMPILE (both needed)
          if [ -d schemas ]; then
            mkdir -p "$EXT_DIR/schemas"
            cp schemas/*.gschema.xml "$EXT_DIR/schemas/"
            glib-compile-schemas "$EXT_DIR/schemas/"
          fi

          # Icons (optional)
          if [ -d icons ]; then
            cp -r icons "$EXT_DIR/"
          fi

          # Translations (optional)
          if [ -d locale ]; then
            cp -r locale "$EXT_DIR/"
          fi

          # Create zip — files at UUID-folder root (what EGO expects)
          rm -f "$EXT_DIR-v${{ steps.tag.outputs.VERSION }}.zip"
          (cd "$EXT_DIR" && zip -r "../$EXT_DIR-v${{ steps.tag.outputs.VERSION }}.zip" .)

          echo "=== Contents of release ZIP ==="
          unzip -l "$EXT_DIR-v${{ steps.tag.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.tag.outputs.VERSION }}"
          files: "${{ steps.uuid.outputs.UUID }}-v${{ steps.tag.outputs.VERSION }}.zip"
          generate_release_notes: true
